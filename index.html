<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basel RFC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🏉 Basel RFC</div>
            <ul class="nav-menu">
                <li><a href="#home">Home</a></li>
                <li><a href="#team">Team</a></li>
                <li><a href="#match">Next Match</a></li>
                <li><a href="#tickets">Tickets</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero">
        <h1>BASEL RFC</h1>
        <p>Champions of Excellence</p>
        <button class="btn">Get Tickets</button>
    </section>

    <!-- Team -->
    <section id="team" class="section">
        <div class="container">
            <h2>Teams</h2>
            <div class="team-grid" id="team-grid"></div>
        </div>
    </section>

    <!-- Next Match -->
    <section id="match" class="section dark">
        <div class="container">
            <h2>Next Match</h2>
            <div class="match" id="next-match"></div>
        </div>
    </section>

    <!-- Tickets -->
    <section id="tickets" class="section">
        <div class="container">
            <h2>Get Tickets</h2>
            <div class="tickets-grid">
                <div class="ticket">
                    <h3>Standard</h3>
                    <p class="price">$25</p>
                    <button class="btn">Buy</button>
                </div>
                <div class="ticket featured">
                    <h3>VIP</h3>
                    <p class="price">$75</p>
                    <button class="btn">Buy</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Basel RFC</p>
        <p>📞 (555) 123-4567 | 📧 info@baselrfc.com</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
